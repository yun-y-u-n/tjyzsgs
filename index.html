<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购信息收集系统</title>
    <!-- 引入Tailwind CSS CDN（不用下载，直接用类名美化） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- 顶部标题 -->
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">采购信息收集系统</h1>

        <!-- 商品选择区域 -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">请选择需要采购的商品</h2>
            <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 商品列表会通过JS自动渲染在这里 -->
            </div>
        </div>

        <!-- 采购信息填写区域 -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">请填写您的采购信息</h2>
            <form id="purchase-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">联系人姓名 <span class="text-red-500">*</span></label>
                        <input type="text" id="contact-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">班级 <span class="text-red-500">*</span></label>
                        <input type="text" id="class-name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">联系方式 </label>
                        <input type="tel" id="information" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                    <textarea id="remark" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                </div>
                <!-- 选中商品预览 -->
                <div id="selected-preview" class="bg-gray-50 rounded-lg p-4 hidden">
                    <h3 class="text-sm font-medium text-gray-700 mb-2">已选商品预览：</h3>
                    <div id="selected-items" class="space-y-1"></div>
                    <div class="mt-2 text-right font-semibold text-gray-800">
                        总金额：<span id="total-price">0.00</span> 元
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200">
                    提交采购信息
                </button>
            </form>
        </div>

        <!-- 底部管理入口（隐藏，只有你知道） -->
        <div class="text-center mt-8 text-gray-400 text-xs">
            <a href="admin.html" class="hover:text-gray-600">管理入口</a>
        </div>
    </div>

    <script>
        // ===================== 1. 初始化Supabase（替换成你自己的地址和密钥！）=====================
        const supabaseUrl = "https://zyllxypawmkqvejlwsci.supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5bGx4eXBhd21rcXZlamx3c2NpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTU4MTIsImV4cCI6MjA5MzQ3MTgxMn0.NDqR_2dtA3CPEMcyZwBLzLonIj6yYzUX7vptvMy383o";
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);
        // 全局变量：选中的商品列表
        let selectedProducts = [];

        // ===================== 2. 页面加载时自动渲染商品列表 =====================
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProducts();
        });

        // 加载上架的商品
        async function loadProducts() {
            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .eq('displayed', true) // 只显示上架的商品
                .order('created_at', { ascending: false }); // 按时间倒序排列

            if (error) {
                alert('加载商品失败：' + error.message);
                return;
            }

            // 渲染商品列表
            const productListDiv = document.getElementById('product-list');
            productListDiv.innerHTML = data.map(product => `
                <div class="border border-gray-200 rounded-lg p-4 hover:shadow-lg transition duration-200">
                    <!-- 商品图片 -->
                    <div class="w-full h-48 bg-gray-100 rounded-lg mb-3 flex items-center justify-center overflow-hidden">
                        ${product.image_url 
                            ? `<img src="${product.image_url}" alt="${product.name}" class="w-full h-full object-cover">`
                            : `<span class="text-gray-400">暂无图片</span>`
                        }
                    </div>
                    <!-- 商品信息 -->
                    <h3 class="text-lg font-semibold text-gray-800 mb-1">${product.name}</h3>
                    <p class="text-xl font-bold text-red-600 mb-3">¥${product.price.toFixed(2)}</p>
                    <!-- 数量选择+加入/移除 -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center border border-gray-300 rounded-lg">
                            <button type="button" class="px-3 py-1 text-gray-600 hover:bg-gray-100" onclick="changeQuantity(${product.id}, -1)">-</button>
                            <input type="number" id="qty-${product.id}" value="1" min="1" class="w-12 text-center border-x border-gray-300 py-1" onchange="updateQuantity(${product.id})">
                            <button type="button" class="px-3 py-1 text-gray-600 hover:bg-gray-100" onclick="changeQuantity(${product.id}, 1)">+</button>
                        </div>
                        <button type="button" id="btn-${product.id}" class="px-4 py-2 rounded-lg font-medium transition duration-200 ${isSelected(product.id) ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white'}" onclick="toggleProduct(${product.id}, '${product.name}', ${product.price})">
                            ${isSelected(product.id) ? '移除' : '加入'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ===================== 3. 商品选择逻辑 =====================
        // 检查商品是否已选中
        function isSelected(productId) {
            return selectedProducts.some(p => p.id === productId);
        }

        // 切换商品选中状态
        function toggleProduct(productId, productName, productPrice) {
            const qtyInput = document.getElementById(`qty-${productId}`);
            const quantity = parseInt(qtyInput.value) || 1;

            if (isSelected(productId)) {
                // 移除商品
                selectedProducts = selectedProducts.filter(p => p.id !== productId);
            } else {
                // 加入商品
                selectedProducts.push({
                    id: productId,
                    name: productName,
                    price: productPrice,
                    quantity: quantity
                });
            }

            // 更新按钮文字和样式
            const btn = document.getElementById(`btn-${productId}`);
            btn.textContent = isSelected(productId) ? '移除' : '加入';
            btn.className = `px-4 py-2 rounded-lg font-medium transition duration-200 ${isSelected(productId) ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white'}`;

            // 更新选中预览
            updateSelectedPreview();
        }

        // 改变商品数量
        function changeQuantity(productId, delta) {
            const qtyInput = document.getElementById(`qty-${productId}`);
            let newQty = parseInt(qtyInput.value) + delta;
            if (newQty < 1) newQty = 1;
            qtyInput.value = newQty;
            updateQuantity(productId);
        }

        // 更新选中商品的数量
        function updateQuantity(productId) {
            const qtyInput = document.getElementById(`qty-${productId}`);
            const newQty = parseInt(qtyInput.value) || 1;

            if (isSelected(productId)) {
                const product = selectedProducts.find(p => p.id === productId);
                product.quantity = newQty;
                updateSelectedPreview();
            }
        }

        // 更新选中商品预览
        function updateSelectedPreview() {
            const previewDiv = document.getElementById('selected-preview');
            const itemsDiv = document.getElementById('selected-items');
            const totalPriceSpan = document.getElementById('total-price');

            if (selectedProducts.length === 0) {
                previewDiv.classList.add('hidden');
                return;
            }

            previewDiv.classList.remove('hidden');
            itemsDiv.innerHTML = selectedProducts.map(p => `
                <div class="flex justify-between text-sm text-gray-700">
                    <span>${p.name} × ${p.quantity}</span>
                    <span>¥${(p.price * p.quantity).toFixed(2)}</span>
                </div>
            `).join('');

            // 计算总金额
            const totalPrice = selectedProducts.reduce((sum, p) => sum + p.price * p.quantity, 0);
            totalPriceSpan.textContent = totalPrice.toFixed(2);
        }

        // ===================== 4. 提交采购单 =====================
        document.getElementById('purchase-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // 阻止表单默认刷新

            if (selectedProducts.length === 0) {
                alert('请至少选择一件商品！');
                return;
            }

            // 收集表单数据
            const contactName = document.getElementById('contact-name').value;
            const information = document.getElementById('information').value;
            const className = document.getElementById('class-name').value;
            const remark = document.getElementById('remark').value;
            const totalPrice = selectedProducts.reduce((sum, p) => sum + p.price * p.quantity, 0);

            // 提交到Supabase
            const { data, error } = await supabaseClient
                .from('purchase_orders')
                .insert([
                    {
                        name: contactName,
                        information: information,
                        class: className,
                        products: selectedProducts,
                        price: totalPrice,
                        remark: remark
                    }
                ]);

            if (error) {
                alert('提交失败：' + error.message);
                return;
            }

            // 提交成功，重置表单
            alert('提交成功！我们会尽快联系您！');
            document.getElementById('purchase-form').reset();
            selectedProducts = [];
            updateSelectedPreview();
            await loadProducts(); // 重新加载商品，重置按钮状态
        });
    </script>
</body>
</html>
